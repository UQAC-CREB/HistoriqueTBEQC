name: Deploy to ShinyApps.io
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libgdal-dev libudunits2-dev

      - name: Install R packages
        run: |
          Rscript -e "
            options(repos = c(CRAN = 'https://cloud.r-project.org'))
            install.packages(c('shiny','rsconnect','dplyr','ggplot2',
                               'leaflet','sf','shinyWidgets','qs'))
          "

      - name: Deploy to ShinyApps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript -e "
            options(repos = c(CRAN = 'https://cloud.r-project.org'))
            rsconnect::setAccountInfo(
              name   = Sys.getenv('SHINYAPPS_ACCOUNT'),
              token  = Sys.getenv('SHINYAPPS_TOKEN'),
              secret = Sys.getenv('SHINYAPPS_SECRET')
            )
            rsconnect::deployApp(
              appDir      = '.',
              appName     = 'HistoriqueTBEQC',
              appFiles    = c('app.R', list.files('data', full.names=TRUE)),
              forceUpdate = TRUE,
              lint        = FALSE
            )
          "